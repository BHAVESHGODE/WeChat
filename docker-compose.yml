services:
  wegift:
    build: .
    ports:
      - "5001:5000"
    environment:
      - PORT=5000
      - GAANA_FLASK_PORT=5001
      - REACT_APP_API_URL=http://localhost:5001
      - MONGODB_URI=mongodb://mongo:27017/wegift
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
